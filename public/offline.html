<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111318" />
    <title>SignalDesk Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background-color: #111318;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #e2e2e8;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-image: radial-gradient(circle, #282a2e 1px, transparent 1px);
        background-size: 24px 24px;
      }

      main {
        width: min(100%, 420px);
        padding: 28px 24px;
        border: 1px solid rgba(0, 229, 255, 0.16);
        border-radius: 28px;
        background: rgba(30, 32, 36, 0.92);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      .mark {
        width: 56px;
        height: 56px;
        margin-bottom: 20px;
        border-radius: 50%;
        border: 1px solid rgba(0, 229, 255, 0.28);
        position: relative;
        box-shadow: 0 0 0 1px rgba(0, 229, 255, 0.08) inset;
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
        inset: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
      }

      .mark::before {
        width: 28px;
        height: 28px;
        border: 2px solid #00e5ff;
        opacity: 0.85;
      }

      .mark::after {
        width: 8px;
        height: 8px;
        background: #00e5ff;
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.7);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #bac9cc;
      }

      .hint {
        margin-top: 16px;
        padding-left: 12px;
        border-left: 1px solid rgba(0, 229, 255, 0.28);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>SignalDesk</h1>
      <p>当前处于离线状态。网络恢复后，SignalDesk 会继续为你加载最新内容。</p>
      <p class="hint">请检查连接后重新打开，或返回已缓存的页面继续查看。</p>
    </main>
  </body>
</html>
